# ── Quick Dental Care — Nginx Production Config ─────────────────────────────
# Place in /etc/nginx/sites-available/quickdental and symlink to sites-enabled.
# Requires: certbot / Let's Encrypt for TLS.
# ─────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Root & index ─────────────────────────────────────────────────────────
    root  /var/www/quickdental/public;
    index index.html;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://generativelanguage.googleapis.com; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; \
         font-src 'self' https://fonts.gstatic.com; \
         img-src 'self' data: https:; \
         connect-src 'self' https://api.green-api.com https://generativelanguage.googleapis.com https://script.google.com; \
         frame-src https://www.google.com; \
         object-src 'none';" always;

    # ── PHP proxy ────────────────────────────────────────────────────────────
    location /proxy/ {
        # Deny direct access to config.php
        location ~ /proxy/config(\.example)?\.php$ {
            deny all;
            return 404;
        }

        fastcgi_pass  unix:/run/php/php8.2-fpm.sock;  # adjust PHP version
        fastcgi_index proxy.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Proxy-specific rate limiting (nginx layer, before PHP)
        limit_req zone=proxy_rl burst=20 nodelay;
    }

    # ── Static assets — aggressive caching ──────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires     30d;
        add_header  Cache-Control "public";
        access_log  off;
    }

    # ── Main SPA fallback ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";   # HTML itself: always revalidate
    }

    # ── Block dotfiles ───────────────────────────────────────────────────────
    location ~ /\. { deny all; access_log off; }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/javascript application/javascript
                      application/json application/xml image/svg+xml;

    # ── Access / error logs ──────────────────────────────────────────────────
    access_log  /var/log/nginx/quickdental_access.log;
    error_log   /var/log/nginx/quickdental_error.log  warn;
}

# ── Rate-limit zone (put in nginx.conf http block, NOT here) ────────────────
# limit_req_zone $binary_remote_addr zone=proxy_rl:10m rate=30r/m;
